<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DevOps Demo App</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { font-size: 3em; margin: 0; }
        .counter { font-size: 5em; font-weight: bold; margin: 20px 0; }
        .status { color: #90ee90; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 DevOps Demo</h1>
        <p class="status">✅ Приложение работает!</p>
        <p>Количество визитов:</p>
        <div class="counter">{{ visits }}</div>
        <p><small>Развернуто через GitLab CI + Docker + Prometheus + Grafana</small></p>
    </div>
</body>
</html>
